<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskMate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">TaskMate</span>
      </div>
      <div class="header-stats">
        <span id="stat-total">0 tasks</span>
        <span class="sep">·</span>
        <span id="stat-done">0 done</span>
      </div>
    </div>
  </header>

  <!-- ── Main ── -->
  <main>

    <!-- Add Task Button -->
    <div class="add-bar">
      <button class="btn-add" id="btn-open-form">
        <span>＋</span> New Task
      </button>
    </div>

    <!-- Add / Edit Form (hidden by default) -->
    <div class="form-overlay" id="form-overlay" hidden>
      <div class="form-card">
        <div class="form-header">
          <h2 id="form-title">New Task</h2>
          <button class="btn-close" id="btn-close-form">✕</button>
        </div>

        <div class="form-group">
          <label for="input-title">Title <span class="required">*</span></label>
          <input type="text" id="input-title" placeholder="What needs to be done?" maxlength="100" />
          <span class="field-error" id="err-title"></span>
        </div>

        <div class="form-group">
          <label for="input-desc">Description</label>
          <textarea id="input-desc" placeholder="Add some details..." rows="3" maxlength="500"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="input-category">Category</label>
            <select id="input-category">
              <option value="General">General</option>
              <option value="Work">Work</option>
              <option value="Personal">Personal</option>
              <option value="School">School</option>
            </select>
          </div>
          <div class="form-group">
            <label for="input-status">Status</label>
            <select id="input-status">
              <option value="pending">Pending</option>
              <option value="done">Done</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn-secondary" id="btn-cancel-form">Cancel</button>
          <button class="btn-primary" id="btn-submit-form">Save Task</button>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <div class="filter-group">
        <span class="filter-label">Category:</span>
        <button class="filter-btn active" data-cat="">All</button>
        <button class="filter-btn" data-cat="Work">Work</button>
        <button class="filter-btn" data-cat="Personal">Personal</button>
        <button class="filter-btn" data-cat="School">School</button>
        <button class="filter-btn" data-cat="General">General</button>
      </div>
      <div class="filter-group">
        <span class="filter-label">Status:</span>
        <button class="filter-btn active" data-status="">All</button>
        <button class="filter-btn" data-status="pending">Pending</button>
        <button class="filter-btn" data-status="done">Done</button>
      </div>
    </div>

    <!-- Task List -->
    <div class="task-list" id="task-list">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📋</div>
        <p>No tasks yet. Add one above!</p>
      </div>
    </div>

  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
